<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#283328">
  <title>Кладовая — нет подключения</title>
  <style>
    :root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f4f5f7;color:#22252a}
    main{width:min(420px,100%);padding:32px;border:1px solid #e1e3e7;border-radius:16px;background:#fff;box-shadow:0 14px 38px rgba(26,32,28,.12);text-align:center}
    .mark{width:58px;height:58px;margin:0 auto 20px;display:grid;place-items:center;border-radius:15px;background:#283328;color:#fff;font-size:28px;font-weight:700}
    h1{margin:0 0 10px;font-size:22px}
    p{margin:0;color:#717680;font-size:14px;line-height:1.55}
    button{margin-top:22px;min-height:42px;border:0;border-radius:9px;padding:10px 16px;background:#283328;color:#fff;font:inherit;font-weight:650;cursor:pointer}
  </style>
</head>
<body>
  <main>
    <div class="mark">К</div>
    <h1>Нет подключения к сети</h1>
    <p>Для защиты клиентских данных система не сохраняет договоры и платежи в офлайн-кэше. Подключитесь к интернету и повторите попытку.</p>
    <button type="button" onclick="location.reload()">Повторить</button>
  </main>
</body>
</html>
