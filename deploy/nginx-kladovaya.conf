limit_req_zone $binary_remote_addr zone=kladovaya_login:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name klad-v.ru www.klad-v.ru kladovaya.217-114-7-70.sslip.io;
    return 301 https://klad-v.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name klad-v.ru www.klad-v.ru;

    ssl_certificate /etc/letsencrypt/live/klad-v.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/klad-v.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 12m;
    server_tokens off;
    limit_req_status 429;

    location = /api/auth/login {
        limit_req zone=kladovaya_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kladovaya.217-114-7-70.sslip.io;

    ssl_certificate /etc/letsencrypt/live/kladovaya.217-114-7-70.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kladovaya.217-114-7-70.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://klad-v.ru$request_uri;
}
